version: '3.8'

services:
  # PostgreSQL - Primary database
  postgres:
    image: postgres:16-alpine
    container_name: cosmicsec-postgres
    environment:
      POSTGRES_DB: cosmicsec
      POSTGRES_USER: cosmicsec
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cosmicsec_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cosmicsec"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cosmicsec-network

  # Redis - Cache and message broker
  redis:
    image: redis:7-alpine
    container_name: cosmicsec-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-cosmicsec_redis_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cosmicsec-network

  # MongoDB - OSINT and unstructured data
  mongodb:
    image: mongo:7
    container_name: cosmicsec-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: cosmicsec
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-cosmicsec_mongo_password}
      MONGO_INITDB_DATABASE: cosmicsec
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - cosmicsec-network

  # Elasticsearch - Logs and search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: cosmicsec-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cosmicsec-network

  # RabbitMQ - Message queue for distributed tasks
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cosmicsec-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: cosmicsec
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-cosmicsec_rabbitmq_password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cosmicsec-network

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: cosmicsec-api-gateway
    environment:
      - DATABASE_URL=postgresql://cosmicsec:${POSTGRES_PASSWORD:-cosmicsec_dev_password}@postgres:5432/cosmicsec
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev_secret_key_change_in_production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app
    command: uvicorn services.api_gateway.main:app --host 0.0.0.0 --port 8000 --reload

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: services/auth-service/Dockerfile
    container_name: cosmicsec-auth-service
    environment:
      - DATABASE_URL=postgresql://cosmicsec:${POSTGRES_PASSWORD:-cosmicsec_dev_password}@postgres:5432/cosmicsec
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev_secret_key_change_in_production}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app
    command: uvicorn services.auth_service.main:app --host 0.0.0.0 --port 8001 --reload

  # Scan Service
  scan-service:
    build:
      context: .
      dockerfile: services/scan-service/Dockerfile
    container_name: cosmicsec-scan-service
    environment:
      - DATABASE_URL=postgresql://cosmicsec:${POSTGRES_PASSWORD:-cosmicsec_dev_password}@postgres:5432/cosmicsec
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - MONGODB_URL=mongodb://cosmicsec:${MONGO_PASSWORD:-cosmicsec_mongo_password}@mongodb:27017/cosmicsec
      - RABBITMQ_URL=amqp://cosmicsec:${RABBITMQ_PASSWORD:-cosmicsec_rabbitmq_password}@rabbitmq:5672/
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app
    command: uvicorn services.scan_service.main:app --host 0.0.0.0 --port 8002 --reload

  # Celery Worker - Background tasks
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-celery-worker
    command: celery -A services.scan_service.main worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://cosmicsec:${POSTGRES_PASSWORD:-cosmicsec_dev_password}@postgres:5432/cosmicsec
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - RABBITMQ_URL=amqp://cosmicsec:${RABBITMQ_PASSWORD:-cosmicsec_rabbitmq_password}@rabbitmq:5672/
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app

networks:
  cosmicsec-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  elasticsearch_data:
  rabbitmq_data:
