version: '3.8'

services:
  # Traefik - edge API gateway / reverse proxy
  traefik:
    image: traefik:v3.1
    container_name: cosmicsec-traefik
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --api.dashboard=true
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - cosmicsec-network

  # Consul - service discovery
  consul:
    image: hashicorp/consul:1.20
    container_name: cosmicsec-consul
    command: "agent -server -ui -bootstrap-expect=1 -client=0.0.0.0"
    ports:
      - "8500:8500"
    networks:
      - cosmicsec-network

  # PostgreSQL - Primary database
  postgres:
    image: postgres:16-alpine
    container_name: cosmicsec-postgres
    environment:
      POSTGRES_DB: cosmicsec
      POSTGRES_USER: cosmicsec
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cosmicsec_dev_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U cosmicsec" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cosmicsec-network

  # Redis - Cache and message broker
  redis:
    image: redis:7-alpine
    container_name: cosmicsec-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "--raw", "incr", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - cosmicsec-network

  # MongoDB - OSINT and unstructured data
  mongodb:
    image: mongo:7
    container_name: cosmicsec-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: cosmicsec
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-cosmicsec_mongo_password}
      MONGO_INITDB_DATABASE: cosmicsec
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - cosmicsec-network

  # Elasticsearch - Logs and search
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: cosmicsec-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cosmicsec-network

  # RabbitMQ - Message queue for distributed tasks
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cosmicsec-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: cosmicsec
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-cosmicsec_rabbitmq_password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cosmicsec-network

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    container_name: cosmicsec-api-gateway
    environment:
      - DATABASE_URL=postgresql://cosmicsec:${POSTGRES_PASSWORD:-cosmicsec_dev_password}@postgres:5432/cosmicsec
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev_secret_key_change_in_production}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app
    command: uvicorn services.api_gateway.main:app --host 0.0.0.0 --port 8000 --reload
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-gateway.rule=PathPrefix(`/api`) || PathPrefix(`/health`) || PathPrefix(`/ws`)
      - traefik.http.routers.cosmicsec-gateway.entrypoints=web
      - traefik.http.services.cosmicsec-gateway.loadbalancer.server.port=8000

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: services/auth_service/Dockerfile
    container_name: cosmicsec-auth-service
    environment:
      - DATABASE_URL=postgresql://cosmicsec:${POSTGRES_PASSWORD:-cosmicsec_dev_password}@postgres:5432/cosmicsec
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev_secret_key_change_in_production}
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app
    command: uvicorn services.auth_service.main:app --host 0.0.0.0 --port 8001 --reload
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-auth.rule=PathPrefix(`/auth`)
      - traefik.http.routers.cosmicsec-auth.entrypoints=web
      - traefik.http.services.cosmicsec-auth.loadbalancer.server.port=8001

  # Scan Service
  scan-service:
    build:
      context: .
      dockerfile: services/scan_service/Dockerfile
    container_name: cosmicsec-scan-service
    environment:
      - DATABASE_URL=postgresql://cosmicsec:${POSTGRES_PASSWORD:-cosmicsec_dev_password}@postgres:5432/cosmicsec
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - MONGODB_URL=mongodb://cosmicsec:${MONGO_PASSWORD:-cosmicsec_mongo_password}@mongodb:27017/cosmicsec
      - RABBITMQ_URL=amqp://cosmicsec:${RABBITMQ_PASSWORD:-cosmicsec_rabbitmq_password}@rabbitmq:5672/
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app
    command: uvicorn services.scan_service.main:app --host 0.0.0.0 --port 8002 --reload
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-scan.rule=PathPrefix(`/scan`)
      - traefik.http.routers.cosmicsec-scan.entrypoints=web
      - traefik.http.services.cosmicsec-scan.loadbalancer.server.port=8002

  # AI Service (Phase 2 — ChromaDB + MITRE ATT&CK + LangChain)
  ai-service:
    build:
      context: .
      dockerfile: services/ai_service/Dockerfile
    container_name: cosmicsec-ai-service
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - CHROMA_PERSIST_DIR=/tmp/cosmicsec_chroma
    ports:
      - "8003:8003"
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app
      - chroma_data:/tmp/cosmicsec_chroma
    command: uvicorn services.ai_service.main:app --host 0.0.0.0 --port 8003 --reload

  # Recon Service
  recon-service:
    build:
      context: .
      dockerfile: services/recon_service/Dockerfile
    container_name: cosmicsec-recon-service
    environment:
      - SHODAN_API_KEY=${SHODAN_API_KEY:-}
      - VIRUSTOTAL_API_KEY=${VIRUSTOTAL_API_KEY:-}
    ports:
      - "8004:8004"
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app
    command: uvicorn services.recon_service.main:app --host 0.0.0.0 --port 8004 --reload

  # Report Service
  report-service:
    build:
      context: .
      dockerfile: services/report_service/Dockerfile
    container_name: cosmicsec-report-service
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8005:8005"
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app
    command: uvicorn services.report_service.main:app --host 0.0.0.0 --port 8005 --reload

  # Collab Service — Phase 2 real-time team collaboration
  collab-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-collab-service
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8006:8006"
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app
    command: uvicorn services.collab_service.main:app --host 0.0.0.0 --port 8006 --reload
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-collab.rule=PathPrefix(`/collab`)
      - traefik.http.routers.cosmicsec-collab.entrypoints=web
      - traefik.http.services.cosmicsec-collab.loadbalancer.server.port=8006

  # Plugin Registry — Phase 2 plugin SDK management
  plugin-registry:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-plugin-registry
    environment:
      - COSMICSEC_PLUGIN_DIRS=/app/plugins/official:/opt/cosmicsec/plugins
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8007:8007"
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app
      - plugin_data:/opt/cosmicsec/plugins
    command: uvicorn plugins.registry:app --host 0.0.0.0 --port 8007 --reload
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-plugins.rule=PathPrefix(`/plugins`)
      - traefik.http.routers.cosmicsec-plugins.entrypoints=web
      - traefik.http.services.cosmicsec-plugins.loadbalancer.server.port=8007

  # Integration Service — Phase 3 integration hub
  integration-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-integration-service
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8008:8008"
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app
    command: uvicorn services.integration_service.main:app --host 0.0.0.0 --port 8008 --reload
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-integration.rule=PathPrefix(`/integration`)
      - traefik.http.routers.cosmicsec-integration.entrypoints=web
      - traefik.http.services.cosmicsec-integration.loadbalancer.server.port=8008

  # Bug Bounty Service — Phase 5 foundation
  bugbounty-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-bugbounty-service
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8009:8009"
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app
    command: uvicorn services.bugbounty_service.main:app --host 0.0.0.0 --port 8009 --reload
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-bugbounty.rule=PathPrefix(`/bugbounty`)
      - traefik.http.routers.cosmicsec-bugbounty.entrypoints=web
      - traefik.http.services.cosmicsec-bugbounty.loadbalancer.server.port=8009

  # Phase 5 Advanced Service
  phase5-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-phase5-service
    environment:
      - ENVIRONMENT=${ENVIRONMENT:-development}
    ports:
      - "8010:8010"
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app
    command: uvicorn services.phase5_service.main:app --host 0.0.0.0 --port 8010 --reload
    labels:
      - traefik.enable=true
      - traefik.http.routers.cosmicsec-phase5.rule=PathPrefix(`/phase5`)
      - traefik.http.routers.cosmicsec-phase5.entrypoints=web
      - traefik.http.services.cosmicsec-phase5.loadbalancer.server.port=8010

  # Celery Worker - Background tasks
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cosmicsec-celery-worker
    command: celery -A services.scan_service.main worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://cosmicsec:${POSTGRES_PASSWORD:-cosmicsec_dev_password}@postgres:5432/cosmicsec
      - REDIS_URL=redis://:${REDIS_PASSWORD:-cosmicsec_redis_password}@redis:6379/0
      - RABBITMQ_URL=amqp://cosmicsec:${RABBITMQ_PASSWORD:-cosmicsec_rabbitmq_password}@rabbitmq:5672/
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - cosmicsec-network
    volumes:
      - ./:/app

networks:
  cosmicsec-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
  elasticsearch_data:
  rabbitmq_data:
  chroma_data:
  plugin_data:
